<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>LineExplorer Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #001F42;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #001F42;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .login-box button:hover {
      background: #005fa3;
    }

    .error {
      color: red;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-box">

    <!-- LOGO SVG (opzione 3) -->
    <svg width="50" height="50" viewBox="0 0 24 24" fill="none"
         stroke="#001F42" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         style="margin-bottom: 15px;">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>

    <h2>Login</h2>
    <h5>Effettua l'accesso per accedere a Line Explorer</h5>

    <input id="user" type="text" placeholder="ID Utente">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Accedi</button>
    <div id="error" class="error">Credenziali errate</div>
  </div>

  <script>
    function login() {
      const username = document.getElementById("user").value;
      const password = document.getElementById("pass").value;

      const utenti = [
        { username: "9001", password: "gr10" },
        { username: "User2", password: "u2" },
        { username: "User3", password: "u3" }
      ];

      const trovato = utenti.find(u => u.username === username && u.password === password);

      if (trovato) {
        window.location.href = "home.html";
      } else {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>

</body>
</html>
